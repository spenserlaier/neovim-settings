# 1. Open directories in a new Kitty window
protocol file
mime inode/directory
action launch --type=window --cwd ${FILE_PATH}

# 2. Open files at a specific line number (e.g., clicking on main.py:42)
protocol file
fragment_matches [0-9]+
action launch --type=overlay nvim +${FRAGMENT} ${FILE_PATH}

# 3. Catch-all: Open ANY other file in Neovim
protocol file
action launch --type=overlay nvim ${FILE_PATH}
