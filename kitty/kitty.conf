#################################
# Font
#################################

term xterm-kitty

# BEGIN_KITTY_FONTS
font_family      family='CaskaydiaCove Nerd Font Mono' 
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
font_size 24

# Better font rendering
disable_ligatures never
adjust_line_height 0
adjust_column_width 0

#################################
# Appearance
#################################

# Theme
#include current-theme.conf

# Padding
window_padding_width 10

# Slight transparency (optional)
background_opacity 0.95

# Cursor
cursor_shape block
cursor_blink_interval 0

#################################
# Scrollback
#################################

scrollback_lines 20000

# Updated to handle ANSI escape codes better in Neovim
scrollback_pager nvim -u NONE -R -M -c 'lua require("term_colors").setup()' -c 'set ft=man' -

#################################
# URL & Mouse Handling
#################################

detect_urls yes

# Restored to default so web links open in browser. 
# Your new open-actions.conf handles the local file clicks with Neovim.
open_url_with default

#################################
# Clipboard
#################################

copy_on_select yes
strip_trailing_spaces smart

#################################
# Performance
#################################

repaint_delay 10
input_delay 3
sync_to_monitor yes

#################################
# Window behavior
#################################

remember_window_size yes
initial_window_width 120c
initial_window_height 35c

#################################
# Tabs (Visuals)
#################################

tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted

#################################
# Keyboard shortcuts
#################################

# Basic clipboard and scrollback
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+f show_scrollback

# Keyboard-driven opening (Kitten Hints)
# ctrl+shift+p > f: Select a file path on screen and open it in nvim (overlay)
map ctrl+shift+p>f kitten hints --type path --program "launch --type=overlay nvim"

# ctrl+shift+p > n: Select a file path and insert it into the terminal command line
map ctrl+shift+p>n kitten hints --type path --program -

# (Native window/tab mappings removed to let Tmux handle multiplexing)
# Clear the default shift+ctrl mapping
clear_all_mouse_actions yes

# Make Cmd+Click open links (Standard Mac behavior)
mouse_map cmd+left click ungrabbed,grabbed mouse_handle_click link

# OR, if you prefer Ctrl+Click
mouse_map ctrl+left click ungrabbed,grabbed mouse_handle_click link

# Restore standard left-click to select text
mouse_map left press ungrabbed mouse_selection normal


# BEGIN_KITTY_THEME
# Gruvbox Dark
include current-theme.conf
# END_KITTY_THEME
