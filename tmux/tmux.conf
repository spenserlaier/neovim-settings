# --- Prefix: Ctrl-a (Best for Vim users) ---
unbind C-b
unbind C-w
set -g prefix C-a
# allows for copy-selection without exit of copy mode
bind-key -T copy-mode-vi y send -X copy-selection
# allows for regular copy-selection and then exit
bind-key -T copy-mode-vi Y send -X copy-selection-and-cancel
# allows for visual select mode (somehow broken on macos)
bind-key -T copy-mode-vi v send -X begin-selection
# may fix issues with macOS clipboard:
set -g set-clipboard on
bind C-a send-prefix

# --- Smart Pane Switching (Vim + Tmux Integration) ---
# This checks: "Is the current pane running Vim?"
# If YES: Send the keys to Vim (let Vim handle the split movement).
# If NO:  Tmux handles the movement natively.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# --- Pane Resizing (keep your existing preference) ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Splits (Keep your vim-like preference) ---
# Note: Now usage is "Ctrl-a + v" or "Ctrl-a + s"
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# --- Copy Mode & Mouse ---
setw -g mode-keys vi
set -g mouse on

# *** FIX: Do not exit copy mode when releasing the mouse ***
unbind -T copy-mode-vi MouseDragEnd1Pane

# --- OS-Agnostic Clipboard Setup ---
# 1. Detect OS and set the universal copy-command
if-shell 'uname -s | grep -q Darwin' 'set -s copy-command "pbcopy"'
if-shell '[ -n "$WAYLAND_DISPLAY" ]' 'set -s copy-command "wl-copy"'
if-shell '[ -z "$WAYLAND_DISPLAY" ] && command -v xclip > /dev/null' 'set -s copy-command "xclip -in -selection clipboard"'

# 2. Bind keys to use whatever copy-command was set above
# Pipe to clipboard and cancel
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel

# Pipe to clipboard but DO NOT exit copy mode
bind-key -T copy-mode-vi Y send-keys -X copy-pipe

# enable sessionizer logic (see fish/config.fish)
bind-key -r f display-popup -E -w 80% -h 80% "~/.config/fish/tmux-sessionizer.fish"
# --- Reload ---
bind r source-file ~/.tmux.conf \; display-message "Tmux Reloaded!"

# establish shortcut for window renaming
bind , command-prompt -I "#W" "rename-window '%%'"

# ==========================================
# PLUGINS (Must be at the absolute bottom)
# ==========================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# configure tmux-resurrect to allow nvim and django restarts
set -g @resurrect-processes 'nvim "~python manage.py runserver"'

# configure tmux-continuum to auto-restore on boot
set -g @continuum-restore 'on'
# (Optional) set save interval in minutes (default is 15)
set -g @continuum-save-interval '15'

# Auto-install TPM and plugins on a fresh machine
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
